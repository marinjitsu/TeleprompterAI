<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRBD Teleprompter Dual-Mode Fix</title>
  <style>
    /* Reset and Core Layout targeting both Phone and 600x600 Glasses HUD Frame */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #000000;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #hud-container {
      width: 100%;
      height: 100%;
      max-width: 600px;
      max-height: 600px;
      position: relative;
      overflow: hidden;
    }

    /* Views Framework */
    .view {
      display: none;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      padding: 20px;
      flex-direction: column;
    }
    .active-view { display: flex; }

    h2 { font-size: 28px; margin-bottom: 15px; color: #00D2FF; text-align: center; }
    
    .menu-list { list-style: none; flex: 1; overflow-y: auto; margin-bottom: 15px; }
    .menu-item {
      padding: 15px 20px;
      margin: 8px 0;
      font-size: 22px;
      background: #111;
      border: 2px solid #333;
      border-radius: 8px;
      cursor: pointer;
    }
    .menu-item.selected {
      background: #00D2FF;
      color: #000;
      border-color: #FFF;
      font-weight: bold;
    }
    .no-scripts-msg {
      text-align: center;
      color: #666;
      font-size: 20px;
      padding: 30px;
      font-style: italic;
    }

    /* PHONE-ONLY SMART EDITOR PANEL */
    #phone-editor-panel {
      background: #111111;
      border-top: 2px solid #222;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    
    /* Device-specific presentation behavior */
    body.glasses-mode #phone-editor-panel {
      display: none !important; /* Forces layout to completely hide on the glasses HUD */
    }
    
    body.phone-mode #hud-container {
      max-width: 100%; /* Spans full screen scale inside the Meta AI App browser */
      max-height: 100%;
    }

    textarea {
      width: 100%; height: 120px; background: #000; color: #FFF; 
      border: 1px solid #444; border-radius: 6px; padding: 12px; font-size: 16px;
      resize: none;
    }
    .btn-row { display: flex; gap: 10px; }
    button {
      flex: 1; padding: 12px; font-size: 14px; font-weight: bold;
      background: #00D2FF; border: none; border-radius: 6px; cursor: pointer; color: #000;
    }

    /* TELEPROMPTER VIEW DISPLAY GRID */
    #prompter-view { padding: 0; justify-content: flex-start; }
    
    .reading-guide {
      position: absolute;
      top: 40%; left: 5%; width: 90%; height: 85px;
      border-top: 2px dashed rgba(0, 210, 255, 0.5);
      border-bottom: 2px dashed rgba(0, 210, 255, 0.5);
      pointer-events: none; z-index: 10;
    }

    .script-scroll-window { width: 100%; height: 100%; overflow: hidden; position: relative; }
    .script-content {
      position: absolute; width: 100%; top: 40%; left: 0; padding: 0 30px;
      transition: transform 0.25s cubic-bezier(0.1, 0.8, 0.2, 1);
    }

    .word-token {
      font-size: 36px; line-height: 1.6; color: #444; display: inline;
      margin-right: 12px; word-wrap: break-word; transition: color 0.1s ease;
    }
    .word-token.spoken { color: #888; }
    .word-token.current { color: #00D2FF; text-shadow: 0 0 8px rgba(0, 210, 255, 0.8); }
    
    .status-bar { position: absolute; bottom: 10px; right: 15px; font-size: 14px; color: #444; z-index: 20; }
    .status-active { color: #00FF66; }
  </style>
</head>
<body class="glasses-mode">

  <div id="hud-container">
    
    <div id="menu-view" class="view active-view">
      <h2>Select Script</h2>
      <ul id="script-list" class="menu-list"></ul>
      
      <div id="phone-editor-panel">
        <textarea id="paste-box" placeholder="Tap here to write or paste a script..."></textarea>
        <div class="btn-row">
          <button onclick="pasteFromClipboard()" style="background:#555; color:#fff;">Paste</button>
          <button onclick="saveNewScript()" style="background:#00FF66;">Save Script</button>
          <button onclick="clearAllScripts()" style="background:#FF3B30; color:#fff; flex:0.5;">Clear</button>
        </div>
      </div>
    </div>

    <div id="prompter-view" class="view">
      <div class="reading-guide"></div>
      <div class="script-scroll-window">
        <div id="script-text-engine" class="script-content"></div>
      </div>
      <div class="status-bar" id="mic-status">● Standby</div>
    </div>

  </div>

  <script>
    let scripts = [];
    let currentMenuIndex = 0;
    let activeView = "menu";
    let selectedScript = null;
    
    let recognition = null;
    let wordsArray = [];
    let currentWordIndex = -1;

    function detectEnvironment() {
      if (window.innerWidth < 650 && window.innerHeight > 650 || !('ontouchstart' in window === false)) {
        document.body.className = "phone-mode";
      } else {
        document.body.className = "glasses-mode";
      }
    }

    function loadScriptsFromStorage() {
      const stored = localStorage.getItem("mrbd_scripts");
      if (stored) {
        scripts = JSON.parse(stored);
      } else {
        scripts = []; // Start completely clean if nothing is saved yet
      }
    }

    function renderMenu() {
      const listEl = document.getElementById("script-list");
      listEl.innerHTML = "";
      
      if (scripts.length === 0) {
        const emptyMsg = document.createElement("div");
        emptyMsg.className = "no-scripts-msg";
        emptyMsg.innerText = "[ No Scripts Saved. Paste one below! ]";
        listEl.appendChild(emptyMsg);
        currentMenuIndex = 0;
        return;
      }

      // Bound check index loop safety
      if (currentMenuIndex >= scripts.length) {
        currentMenuIndex = Math.max(0, scripts.length - 1);
      }

      scripts.forEach((script, idx) => {
        const li = document.createElement("li");
        li.className = `menu-item ${idx === currentMenuIndex ? 'selected' : ''}`;
        li.innerText = script.title;
        li.onclick = () => { 
          currentMenuIndex = idx; 
          renderMenu(); 
          document.getElementById("paste-box").value = scripts[idx].text;
        };
        listEl.appendChild(li);
      });
    }

    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        document.getElementById("paste-box").value = text;
      } catch (err) {
        alert("Clipboard access restricted. Press and hold inside the text area to manually paste your script.");
      }
    }

    function saveNewScript() {
      const text = document.getElementById("paste-box").value.trim();
      if(!text) return;
      
      const title = text.split(/\s+/).slice(0, 3).join(" ") + "...";
      const newScript = { id: Date.now(), title: title, text: text };
      
      scripts.push(newScript);
      localStorage.setItem("mrbd_scripts", JSON.stringify(scripts));
      document.getElementById("paste-box").value = "";
      
      // Target the newly added item automatically
      currentMenuIndex = scripts.length - 1; 
      renderMenu();
    }

    function clearAllScripts() {
      if(confirm("Are you sure you want to delete all saved scripts?")) {
        scripts = [];
        localStorage.removeItem("mrbd_scripts");
        document.getElementById("paste-box").value = "";
        renderMenu();
      }
    }

    function switchView(viewName) {
      activeView = viewName;
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
      if(viewName === "menu") {
